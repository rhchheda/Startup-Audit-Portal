<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLE CTIE — Startup Audit Portal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --blue:#0B1F3A; --mid:#16305C; --gold:#C9A227; --goldlt:#F3E3B3; --pale:#EEF2F9; --amber:#FCE5CD; --red:#F4CCCC; --green:#D9EAD3; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Segoe UI',Tahoma,sans-serif; background:#f4f6f9; color:#222; }
  header { background:linear-gradient(90deg,var(--blue),var(--mid)); color:#fff; padding:14px 22px; display:flex; align-items:center; gap:14px; border-bottom:3px solid var(--gold); }
  header h1 { font-size:1.15rem; flex:1; letter-spacing:.3px; }
  header h1 .gold { color:var(--gold); }
  .badge { background:var(--gold); color:var(--blue); font-weight:700; padding:3px 10px; border-radius:12px; font-size:.75rem; }
  button { cursor:pointer; border:none; border-radius:6px; padding:8px 14px; font-size:.85rem; }
  .btn-light { background:#fff; color:var(--blue); font-weight:600; }
  .btn-blue { background:var(--mid); color:#fff; }
  .btn-green { background:#3d8b40; color:#fff; }
  .btn-red { background:#b3403a; color:#fff; }
  /* login */
  #loginView { max-width:360px; margin:10vh auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 4px 18px rgba(0,0,0,.1); text-align:center; }
  #loginView input { width:100%; padding:10px; margin:14px 0; border:1px solid #ccc; border-radius:6px; }
  .err { color:#b3403a; font-size:.85rem; min-height:1.2em; }
  /* layout */
  #app { display:none; }
  nav.tabs { background:#fff; border-bottom:1px solid #ddd; padding:0 22px; display:flex; gap:4px; }
  nav.tabs button { background:none; border-radius:0; padding:12px 16px; border-bottom:3px solid transparent; color:#555; }
  nav.tabs button.active { border-color:var(--gold); color:var(--blue); font-weight:600; }
  main { padding:20px 22px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:20px; }
  .card { background:#fff; border-radius:10px; padding:15px 16px; box-shadow:0 1px 4px rgba(0,0,0,.08); border-top:4px solid var(--accent,var(--gold)); position:relative; }
  .card .num { font-size:1.7rem; font-weight:700; color:var(--accent,var(--blue)); }
  .card .sub { font-size:.76rem; color:#5a6472; margin-top:4px; line-height:1.25; }
  .card .ico { position:absolute; top:12px; right:14px; font-size:1.1rem; opacity:.35; }
  .cards.small .card .num { font-size:1.3rem; }
  /* professional distinguishable KPI accent palette */
  .a-navy{--accent:#0B1F3A} .a-gold{--accent:#B8901F} .a-teal{--accent:#0E7C7B}
  .a-green{--accent:#2E7D46} .a-blue{--accent:#2464A6} .a-purple{--accent:#6A4C93}
  .a-amber{--accent:#D98C0A} .a-red{--accent:#B3403A} .a-slate{--accent:#5A6B87} .a-magenta{--accent:#9B2D6F}
  .charts { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
  .chartbox { background:#fff; border-radius:10px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .chartbox h3 { font-size:.9rem; color:var(--blue); margin-bottom:10px; }
  /* startups */
  .split { display:grid; grid-template-columns:300px 1fr; gap:18px; }
  #startupList { background:#fff; border-radius:10px; max-height:75vh; overflow-y:auto; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  #startupList input { width:calc(100% - 20px); margin:10px 10px 4px; padding:8px; border:1px solid #ccc; border-radius:6px; }
  .filters { padding:4px 10px 8px; display:grid; grid-template-columns:1fr 1fr; gap:6px; border-bottom:2px solid var(--gold); }
  .filters select { width:100%; padding:5px 4px; border:1px solid #ccc; border-radius:6px; font-size:.76rem; background:#fff; color:#333; }
  .fcount { font-size:.72rem; color:#777; padding:6px 14px 2px; }
  #startupList li { list-style:none; padding:10px 14px; border-bottom:1px solid #f0f0f0; cursor:pointer; font-size:.85rem; }
  #startupList li:hover, #startupList li.sel { background:var(--pale); }
  #detail { background:#fff; border-radius:10px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.08); max-height:75vh; overflow-y:auto; }
  #detail h2 { color:var(--blue); font-size:1.1rem; margin-bottom:4px; }
  .section-h { background:var(--pale); color:var(--blue); font-weight:600; padding:6px 10px; border-radius:6px; margin:16px 0 6px; font-size:.85rem; border-left:4px solid var(--gold); }
  table.fields { width:100%; border-collapse:collapse; }
  table.fields td { padding:6px 8px; border-bottom:1px solid #f2f2f2; font-size:.83rem; vertical-align:top; }
  table.fields td:first-child { width:34%; color:#555; }
  table.fields textarea { width:100%; min-height:34px; border:1px solid #d8d8d8; border-radius:5px; padding:5px; font:inherit; }
  .empty-cell { background:var(--amber); border-radius:4px; padding:2px 6px; font-size:.75rem; color:#8a5a00; }
  .toolbar { display:flex; gap:8px; margin:10px 0; flex-wrap:wrap; }
  /* findings & pending */
  table.list { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  table.list th { background:var(--mid); color:#fff; padding:9px 10px; text-align:left; font-size:.8rem; }
  table.list td { padding:8px 10px; border-bottom:1px solid #f0f0f0; font-size:.8rem; }
  .pill { padding:2px 8px; border-radius:10px; font-size:.72rem; }
  .toast { position:fixed; bottom:44px; right:18px; background:var(--blue); color:#fff; padding:12px 18px; border-radius:8px; display:none; z-index:60; }
  /* sticky footer */
  body { padding-bottom:34px; }
  .site-footer { position:fixed; left:0; right:0; bottom:0; height:30px; z-index:55;
    background:linear-gradient(90deg,var(--blue),var(--mid)); border-top:2px solid var(--gold);
    color:#e8ecf3; font-size:.78rem; display:flex; align-items:center; justify-content:center; gap:6px; letter-spacing:.2px; }
  .site-footer .hb { color:#e0322e; display:inline-block; animation:throb 1s ease-in-out infinite; }
  .site-footer .rhc { color:var(--gold); font-weight:600; }
  @keyframes throb { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.35); } }
  @media (prefers-reduced-motion:reduce){ .site-footer .hb{ animation:none; } }
  /* founder */
  #founderView { max-width:640px; margin:5vh auto; background:#fff; border-radius:12px; padding:28px; box-shadow:0 4px 18px rgba(0,0,0,.1); display:none; }
  @media (max-width:820px){ .split{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
  <h1>KLE CTIE — <span class="gold">Startup Audit Portal</span></h1>
  <span class="badge" id="roleBadge" style="display:none"></span>
  <button class="btn-light" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
</header>

<!-- LOGIN -->
<div id="loginView">
  <h2 style="color:var(--blue)">Sign in</h2>
  <p style="font-size:.85rem;color:#666;margin-top:6px">Enter the viewer or admin password</p>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
  <div class="err" id="loginErr"></div>
  <button class="btn-blue" style="width:100%" onclick="login()">Login</button>
</div>

<!-- FOUNDER TOKEN FORM -->
<div id="founderView"></div>

<!-- APP -->
<div id="app">
  <nav class="tabs">
    <button id="tab-dash" class="active" onclick="showTab('dash')">Dashboard</button>
    <button id="tab-startups" onclick="showTab('startups')">Startups</button>
    <button id="tab-findings" onclick="showTab('findings')">Audit Findings</button>
    <button id="tab-pending" style="display:none" onclick="showTab('pending')">Pending Submissions</button>
  </nav>
  <main>
    <div id="view-dash"><div class="cards" id="cards"></div><div class="cards small" id="cards2"></div><div class="charts" id="charts"></div></div>
    <div id="view-startups" style="display:none">
      <div class="toolbar" id="adminToolbar" style="display:none">
        <button class="btn-blue" onclick="addStartup()">+ Add Startup</button>
      </div>
      <div class="split">
        <div id="startupList">
          <input id="search" placeholder="Search startups…" oninput="renderList()">
          <div class="filters">
            <select id="fScheme" onchange="renderList()"></select>
            <select id="fSector" onchange="renderList()"></select>
            <select id="fWomen" onchange="renderList()">
              <option value="">Women-led: All</option><option value="Y">Women-led: Yes</option><option value="N">Women-led: No</option>
            </select>
            <select id="fAgr" onchange="renderList()">
              <option value="">Agreement: All</option><option value="Y">Agreement: Yes</option><option value="N">Agreement: No</option><option value="_blank">Agreement: Unverified</option>
            </select>
            <select id="fUC" onchange="renderList()" style="grid-column:1 / -1">
              <option value="">UC status: All</option><option value="Certified">UC: Certified</option><option value="Pending / issue">UC: Pending / issue</option><option value="Blank">UC: Blank</option>
            </select>
          </div>
          <div class="fcount" id="fcount"></div>
          <ul id="slist"></ul>
        </div>
        <div id="detail"><p style="color:#888">Select a startup to view its complete audit record.</p></div>
      </div>
    </div>
    <div id="view-findings" style="display:none"></div>
    <div id="view-pending" style="display:none"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<footer class="site-footer">Made with <span class="hb">❤</span> <span class="rhc">~rhc</span> &nbsp;·&nbsp; EE Lab, KLE-CTiE</footer>

<script>
// ======================= CONFIG =======================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxAPAiR3VE4Y5DV62k_cz5YjSMkLgp-SIgqSDw_xI88MTSMBtyIQ4A6wZUo2yrbuUYSLA/exec';   // deploy Code.gs as Web App (execute as Me, access: Anyone)
const PORTAL_URL = location.origin + location.pathname;

let session = { token: sessionStorage.getItem('pat'), role: sessionStorage.getItem('par') };
let startups = [], currentCol = null, currentFields = [];

// ======================= HELPERS =======================
async function apiGet(params) {
  const q = new URLSearchParams(params); if (session.token) q.set('token', session.token);
  const res = await fetch(GAS_URL + '?' + q.toString());
  const data = await res.json();
  if (data.error === 'SESSION_EXPIRED') { hardLogout('Session expired — please log in again.'); throw new Error('expired'); }
  return data;
}
async function apiPost(body) {
  body.token = session.token;
  const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (data.error === 'SESSION_EXPIRED') { hardLogout('Session expired — please log in again.'); throw new Error('expired'); }
  return data;
}
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3200); }
function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

// ======================= AUTH =======================
async function login() {
  const pw = document.getElementById('pw').value;
  const r = await (await fetch(GAS_URL + '?action=login&password=' + encodeURIComponent(pw))).json();
  if (!r.success) { document.getElementById('loginErr').textContent = r.error; return; }
  session = { token: r.token, role: r.role };
  sessionStorage.setItem('pat', r.token); sessionStorage.setItem('par', r.role);
  enterApp();
}
async function logout() { try { await apiGet({ action: 'logout' }); } catch (e) {} hardLogout(); }
function hardLogout(msg) {
  sessionStorage.clear(); session = { token: null, role: null };
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('roleBadge').style.display = 'none';
  if (msg) document.getElementById('loginErr').textContent = msg;
}
function enterApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'inline-block';
  const b = document.getElementById('roleBadge'); b.style.display = 'inline-block';
  b.textContent = session.role === 'admin' ? 'ADMIN' : 'VIEWER';
  if (session.role === 'admin') { document.getElementById('tab-pending').style.display = 'inline-block'; document.getElementById('adminToolbar').style.display = 'flex'; }
  loadDashboard(); loadStartups();
}

// ======================= TABS =======================
function showTab(t) {
  ['dash','startups','findings','pending'].forEach(x => {
    document.getElementById('view-' + x).style.display = x === t ? 'block' : 'none';
    const btn = document.getElementById('tab-' + x); if (btn) btn.classList.toggle('active', x === t);
  });
  if (t === 'findings') loadFindings();
  if (t === 'pending') loadPending();
}

// ======================= DASHBOARD =======================
let chartRefs = [];
// money in lakhs -> "x.xx Cr" when >= 1 crore, else "x.xx L"
function fmtMoney(l) { return l >= 100 ? (l / 100).toFixed(2) + ' Cr' : (l || 0).toFixed(2) + ' L'; }

async function loadDashboard() {
  const r = await apiGet({ action: 'getDashboard' }); if (!r.success) return;
  const d = r.dashboard, rt = d.rates || {}, im = d.impact || {};
  const dp = d.dpiit || { registered: 0, pct: 0 };
  const card = (cls, ico, num, sub) => `<div class="card ${cls}"><span class="ico">${ico}</span><div class="num">${num}</div><div class="sub">${sub}</div></div>`;
  document.getElementById('cards').innerHTML =
    card('a-navy', '🏢', d.totalStartups, 'Portfolio Startups') +
    card('a-gold', '₹', fmtMoney(d.fundsLakhs.sanctioned), 'Total Sanctioned') +
    card('a-gold', '₹', fmtMoney(d.fundsLakhs.disbursed), 'Total Disbursed') +
    card('a-gold', '₹', fmtMoney(d.fundsLakhs.ucCertified), 'UC-certified Utilization') +
    card('a-teal', '📊', (rt.disbursement || 0).toFixed(1) + '%', 'Disbursement Rate (disbursed ÷ sanctioned)') +
    card('a-teal', '📈', (rt.utilization || 0).toFixed(1) + '%', 'Utilization Rate (UC ÷ disbursed)');
  document.getElementById('cards2').innerHTML =
    card('a-green', '✅', (rt.ucCompliance || 0).toFixed(0) + '%', 'UC Compliance (certified UC on file)') +
    card('a-green', '📝', (rt.agrCompliance || 0).toFixed(0) + '%', `Agreement Compliance (${d.agreement.Y}Y / ${d.agreement.N}N, ${d.agreement.blank} unverified)`) +
    card('a-green', '📄', (rt.docsCompliance || 0).toFixed(0) + '%', `Project Report Submissions (${d.docsSubmitted}/${d.totalStartups})`) +
    card('a-blue', '🎖️', `${dp.registered} · ${dp.pct.toFixed(0)}%`, 'DPIIT-registered Startups') +
    card('a-slate', '📑', d.sanctionLetter.Y, 'Sanction Letters on file') +
    card('a-purple', '👥', im.employment || 0, 'Jobs Generated (reported)') +
    card('a-magenta', '♀', im.womenLed || 0, 'Women-supported Startups') +
    card('a-amber', '💡', im.patents || 0, 'Startups with Patents / IP') +
    card('a-navy', '₹', fmtMoney(im.revenueLakhs || 0), `Revenue Reported (${im.revenueReportedBy || 0} startups)`) +
    card('a-red', '⚠️', d.openFindings, 'Open Audit Findings');
  document.getElementById('charts').innerHTML = `
    <div class="chartbox"><h3>Scheme distribution</h3><canvas id="c1"></canvas></div>
    <div class="chartbox"><h3>UC status</h3><canvas id="c2"></canvas></div>
    <div class="chartbox"><h3>Agreement availability</h3><canvas id="c3"></canvas></div>
    <div class="chartbox"><h3>Top 5 by sanctioned funds</h3><canvas id="c4"></canvas></div>`;
  chartRefs.forEach(c => c.destroy()); chartRefs = [];
  const NAVY = '#0B1F3A', NAVY2 = '#16305C', GOLD = '#C9A227', GOLDLT = '#E8CD7A', SLATE = '#7C93B8';
  const palette = [NAVY, GOLD, NAVY2, GOLDLT, SLATE, '#3E5C8A', '#A88A1F', '#C4CFDE'];
  chartRefs.push(new Chart(c1, { type: 'doughnut', data: { labels: Object.keys(d.schemes), datasets: [{ data: Object.values(d.schemes), backgroundColor: palette, borderColor: '#fff' }] } }));
  chartRefs.push(new Chart(c2, { type: 'pie', data: { labels: ['CA-certified', 'Pending / issue', 'Blank'], datasets: [{ data: [d.ucStatus.certified, d.ucStatus.pendingOrIssue, d.ucStatus.blank], backgroundColor: [NAVY, GOLD, SLATE], borderColor: '#fff' }] } }));
  chartRefs.push(new Chart(c3, { type: 'bar', data: { labels: ['Yes', 'No', 'Unverified'], datasets: [{ label: 'Startups', data: [d.agreement.Y, d.agreement.N, d.agreement.blank], backgroundColor: [NAVY, GOLD, SLATE] }] }, options: { plugins: { legend: { display: false } } } }));
  const top = d.topSanctioned || [];
  chartRefs.push(new Chart(c4, { type: 'bar',
    data: { labels: top.map(t => t.name.length > 24 ? t.name.slice(0, 22) + '…' : t.name),
            datasets: [{ label: 'Sanctioned', data: top.map(t => t.sanctioned), backgroundColor: GOLD, borderColor: NAVY, borderWidth: 1 }] },
    options: { indexAxis: 'y', plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => fmtMoney(ctx.parsed.x) } } },
      scales: { x: { ticks: { callback: v => fmtMoney(v) } } } } }));
}

// ======================= STARTUP LIST / DETAIL =======================
async function loadStartups() {
  const r = await apiGet({ action: 'getStartups' }); if (!r.success) return;
  startups = r.startups;
  buildFilterOptions('fScheme', 'Scheme', startups.map(s => s.scheme));
  buildFilterOptions('fSector', 'Domain', startups.map(s => s.sector));
  renderList();
}
function buildFilterOptions(id, label, values) {
  const sel = document.getElementById(id);
  const opts = [...new Set(values.filter(v => v))].sort();
  sel.innerHTML = `<option value="">${label}: All</option>` +
    opts.map(o => `<option value="${esc(o)}">${esc(o.length > 26 ? o.slice(0, 24) + '…' : o)}</option>`).join('');
}
function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const fS = document.getElementById('fScheme').value, fD = document.getElementById('fSector').value,
        fW = document.getElementById('fWomen').value, fA = document.getElementById('fAgr').value,
        fU = document.getElementById('fUC').value;
  const list = startups.filter(s =>
    s.name.toLowerCase().includes(q) &&
    (!fS || s.scheme === fS) &&
    (!fD || s.sector === fD) &&
    (!fW || s.women === fW) &&
    (fA === '' || (fA === '_blank' ? s.agreement === '' : s.agreement === fA)) &&
    (!fU || s.ucStatus === fU));
  document.getElementById('fcount').textContent = `${list.length} of ${startups.length} startups`;
  document.getElementById('slist').innerHTML = list
    .map(s => `<li class="${s.col === currentCol ? 'sel' : ''}" onclick="openStartup(${s.col})">${esc(s.name)}</li>`).join('');
}
async function openStartup(col) {
  currentCol = col; renderList();
  document.getElementById('detail').innerHTML = '<p style="color:#888">Loading…</p>';
  const r = await apiGet({ action: 'getStartup', col: col }); if (!r.success) return;
  currentFields = r.fields;
  const isAdmin = session.role === 'admin';
  let html = `<h2>${esc(r.name)}</h2>`;
  if (isAdmin) html += `<div class="toolbar">
      <button class="btn-green" onclick="saveEdits()">💾 Save changes</button>
      <button class="btn-blue" onclick="requestMissing(${col}, '${esc(r.name).replace(/'/g, "\\'")}')">✉ Request missing data (tokenized link)</button>
    </div>`;
  let section = '';
  html += '<table class="fields">';
  r.fields.forEach(f => {
    if (f.section !== section) { section = f.section; html += `</table><div class="section-h">${esc(section)}</div><table class="fields">`; }
    let valCell;
    if (f.isLink && f.link) valCell = `<a href="${esc(f.link)}" target="_blank" rel="noopener">${esc(f.value || 'Open')}</a>`;
    else if (isAdmin && !f.isLink) valCell = `<textarea data-row="${f.row}">${esc(f.value)}</textarea>`;
    else valCell = f.value ? esc(f.value) : '<span class="empty-cell">missing</span>';
    html += `<tr><td>${esc(f.label)}</td><td>${valCell}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('detail').innerHTML = html;
}

// ======================= ADMIN CRUD =======================
async function saveEdits() {
  const updates = [];
  document.querySelectorAll('#detail textarea').forEach(t => {
    const row = parseInt(t.dataset.row, 10);
    const orig = currentFields.find(f => f.row === row);
    if (orig && t.value !== orig.value) updates.push({ row: row, value: t.value });
  });
  if (!updates.length) { toast('No changes to save'); return; }
  const r = await apiPost({ action: 'updateCells', col: currentCol, updates: updates });
  toast(r.success ? `Saved ${r.updated} field(s)` : 'Error: ' + r.error);
  if (r.success) openStartup(currentCol);
}
async function addStartup() {
  const name = prompt('New startup name:'); if (!name) return;
  const r = await apiPost({ action: 'addStartup', name: name });
  if (r.success) { toast('Added ' + name); loadStartups(); openStartup(r.col); } else toast('Error: ' + r.error);
}
async function requestMissing(col, name) {
  const email = (prompt(`Founder email for "${name}"?\n\nLeave BLANK if they have no email — you'll get a link to copy or share on WhatsApp.`) || '').trim();
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('That does not look like a valid email'); return; }
  const r = await apiPost({ action: 'generateToken', col: col, email: email, portalUrl: PORTAL_URL });
  if (!r.success) { toast('Error: ' + r.error); return; }
  try { await navigator.clipboard.writeText(r.link); } catch (e) {}
  if (email) { toast('✉ Email sent to ' + email + ' & link copied (valid 7 days)'); return; }
  // no email: offer WhatsApp share
  const msg = encodeURIComponent(`KLE-CTIE: Please submit the missing details for ${name} using this secure link (valid 7 days): ${r.link}`);
  if (confirm('Link copied to clipboard (valid 7 days).\n\nOpen WhatsApp to share it now?')) {
    window.open('https://wa.me/?text=' + msg, '_blank');
  }
}

// ======================= FINDINGS =======================
async function loadFindings() {
  const v = document.getElementById('view-findings');
  v.innerHTML = '<p style="color:#888">Loading…</p>';
  const r = await apiGet({ action: 'getAuditFindings' }); if (!r.success) return;
  v.innerHTML = `<table class="list"><tr><th>#</th><th>Startup</th><th>Col</th><th>Field</th><th>Issue / Action</th></tr>` +
    r.findings.map((f, i) => `<tr><td>${i + 1}</td><td>${esc(f.startup)}</td><td>${esc(f.column)}</td><td>${esc(f.field)}</td><td>${esc(f.issue)}</td></tr>`).join('') + '</table>';
}

// ======================= PENDING SUBMISSIONS (admin) =======================
async function loadPending() {
  const v = document.getElementById('view-pending');
  v.innerHTML = '<p style="color:#888">Loading…</p>';
  const r = await apiGet({ action: 'getPending' }); if (!r.success) return;
  if (!r.pending.length) { v.innerHTML = '<p style="color:#666">No pending founder submissions. 🎉</p>'; return; }
  v.innerHTML = `<table class="list"><tr><th>Startup</th><th>Field</th><th>Submitted value</th><th>When</th><th>Action</th></tr>` +
    r.pending.map(p => `<tr><td>${esc(p.startup)}</td><td>${esc(p.field)}</td><td>${esc(p.value)}</td><td>${esc(String(p.when).slice(0, 21))}</td>
      <td><button class="btn-green" onclick="review(${p.pendingRow}, 'approve')">Approve</button>
          <button class="btn-red" onclick="review(${p.pendingRow}, 'reject')">Reject</button></td></tr>`).join('') + '</table>';
}
async function review(row, decision) {
  const r = await apiPost({ action: 'reviewSubmission', pendingRow: row, decision: decision });
  toast(r.success ? 'Submission ' + decision + 'd' : 'Error: ' + r.error);
  loadPending();
}

// ======================= FOUNDER TOKEN MODE =======================
async function founderMode(ftoken) {
  document.getElementById('loginView').style.display = 'none';
  const v = document.getElementById('founderView');
  v.style.display = 'block';
  v.innerHTML = '<p style="color:#888">Loading your form…</p>';
  const r = await (await fetch(GAS_URL + '?action=founderForm&ftoken=' + encodeURIComponent(ftoken))).json();
  if (!r.success) { v.innerHTML = `<h2 style="color:#b3403a">Link problem</h2><p>${esc(r.error)}</p>`; return; }
  if (!r.fields.length) { v.innerHTML = `<h2 style="color:var(--blue)">${esc(r.startup)}</h2><p>No pending fields — everything is up to date. Thank you!</p>`; return; }
  v.innerHTML = `<h2 style="color:var(--blue)">${esc(r.startup)}</h2>
    <p style="font-size:.85rem;color:#666;margin:8px 0 16px">KLE-CTIE has requested the following details. Fill what you can and submit — your entries will be reviewed before being added to the records.</p>
    <table class="fields">` +
    r.fields.map(f => `<tr><td>${esc(f.label)}<div style="font-size:.68rem;color:#999">${fieldHint(f.type)}</div></td>
      <td>${fieldInput(f)}<div class="err fielderr" style="font-size:.72rem"></div></td></tr>`).join('') +
    `</table><br><button class="btn-green" onclick="founderSubmit('${esc(ftoken)}')">Submit to KLE-CTIE</button><div class="err" id="fmsg" style="margin-top:10px"></div>`;
}
function fieldHint(t) {
  return { yesno:'Y or N', money:'e.g. 7.00 L or 500000', date:'e.g. 05-Feb-2024', url:'https://…',
           contact:'email or phone', dpiit:'e.g. DIPP146064', text:'' }[t] || '';
}
function fieldInput(f) {
  const a = `data-row="${f.row}" data-type="${f.type}" data-field="${esc(f.label)}" oninput="validateFounderField(this)"`;
  if (f.type === 'yesno') return `<select ${a}><option value="">—</option><option>Y</option><option>N</option></select>`;
  if (f.type === 'money') return `<input type="text" inputmode="decimal" placeholder="7.00 L" ${a}>`;
  if (f.type === 'url')   return `<input type="url" placeholder="https://" ${a}>`;
  if (f.type === 'contact') return `<input type="text" placeholder="name@email.com / 98xxxxxxxx" ${a}>`;
  return `<textarea ${a}></textarea>`;
}
function validateFounderField(el) {
  const err = clientValidate(el.dataset.type, el.value);
  const box = el.parentElement.querySelector('.fielderr');
  if (box) box.textContent = err;
  el.style.borderColor = err && el.value.trim() ? '#b3403a' : '#d8d8d8';
  return err;
}
function clientValidate(type, value) {
  const v = (value || '').trim(); if (!v) return '';
  if (type === 'yesno')   return /^(y|n|yes|no)$/i.test(v) ? '' : 'Enter Y or N';
  if (type === 'money')   return /^(rs\.?\s*)?\d[\d,]*(\.\d+)?\s*(l|lakh|lakhs|cr|crore)?$/i.test(v) ? '' : 'e.g. 7.00 L or 500000';
  if (type === 'url')     return /^(https?:\/\/|www\.)/i.test(v) || /\.[a-z]{2,}/i.test(v) ? '' : 'Enter a valid link';
  if (type === 'contact') return /@/.test(v) || /\d{6,}/.test(v) ? '' : 'Enter an email or phone';
  if (type === 'dpiit')   return /dipp\s*\d+/i.test(v) ? '' : 'e.g. DIPP146064';
  if (type === 'date')    return v.length >= 4 ? '' : 'e.g. 05-Feb-2024';
  return v.length >= 2 ? '' : 'A little more detail, please';
}
async function founderSubmit(ftoken) {
  const entries = []; let firstErr = '';
  document.querySelectorAll('#founderView [data-row]').forEach(t => {
    const val = (t.value || '').trim(); if (!val) return;
    const err = validateFounderField(t); if (err && !firstErr) firstErr = t.dataset.field + ': ' + err;
    entries.push({ row: parseInt(t.dataset.row, 10), field: t.dataset.field, value: val });
  });
  const msg = document.getElementById('fmsg');
  if (!entries.length) { msg.textContent = 'Please fill at least one field.'; return; }
  if (firstErr) { msg.textContent = 'Please fix — ' + firstErr; return; }
  msg.textContent = 'Submitting…';
  const r = await (await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'submitFounderData', ftoken: ftoken, entries: entries }) })).json();
  document.getElementById('founderView').innerHTML = r.success
    ? `<h2 style="color:#3d8b40">✔ Submitted</h2><p>${esc(r.message)}</p>`
    : `<h2 style="color:#b3403a">Almost there</h2><p>${esc(r.error)}</p><button class="btn-blue" style="margin-top:12px" onclick="founderMode('${esc(ftoken)}')">Back to form</button>`;
}

// ======================= BOOT =======================
const ftoken = new URLSearchParams(location.search).get('ftoken');
if (ftoken) founderMode(ftoken);
else if (session.token) enterApp();
</script>
